name: Package Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-smoke:
    name: Package smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Import package modules
        run: python scripts/qa/check_package_smoke.py

      - name: Run console entrypoints
        run: |
          trans-latin-validate-records
          trans-latin-validate-units
